# Vhost Nginx per pubblicare l'API S3 di MinIO.
#
# 1) Cambia 'server_name' con il tuo dominio reale.
# 2) Assicurati che MinIO sia bindato localmente su 127.0.0.1:9000.
# 3) Dopo il test di configurazione, usa Certbot per generare i certificati TLS.

server {
    listen 80;
    listen [::]:80;
    server_name minio.example.com;

    # Fondamentale per upload object di qualsiasi dimensione.
    client_max_body_size 0;

    # Fondamentale per streaming upload/download lato S3.
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;

        # Mantieni l'host originale: importante per S3 / redirect / firma richieste.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout ampi per oggetti grandi.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

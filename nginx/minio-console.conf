# Vhost Nginx per pubblicare la Console MinIO.
#
# 1) Cambia 'server_name' con il tuo dominio reale.
# 2) Assicurati di impostare MINIO_BROWSER_REDIRECT_URL nel file .env.
# 3) Dopo il test di configurazione, usa Certbot per generare i certificati TLS.

server {
    listen 80;
    listen [::]:80;
    server_name console.minio.example.com;

    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Supporto WebSocket / upgrade connessioni, utile per la Console.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
